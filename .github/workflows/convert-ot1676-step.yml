name: Package OCCT runtime

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/convert-ot1676-step.yml'
  pull_request:
    paths:
      - 'conversion/ot1676-trigger.txt'
      - '.github/workflows/convert-ot1676-step.yml'

permissions:
  contents: read

jobs:
  package-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download OpenCascade JavaScript runtime
        run: |
          mkdir -p runtime
          cd runtime
          npm pack occt-import-js@0.0.23
          tar -xzf occt-import-js-0.0.23.tgz
          cp package/dist/occt-import-js.js .
          cp package/dist/occt-import-js.wasm .
          printf '{"name":"occt-runtime","version":"0.0.23","type":"commonjs"}\n' > package.json
          ls -lh occt-import-js.js occt-import-js.wasm package.json

      - name: Upload OpenCascade runtime
        uses: actions/upload-artifact@v4
        with:
          name: OCCT-IMPORT-JS-RUNTIME
          path: |
            runtime/occt-import-js.js
            runtime/occt-import-js.wasm
            runtime/package.json
          if-no-files-found: error
          compression-level: 9
          retention-days: 3
