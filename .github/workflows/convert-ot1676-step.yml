name: Package Web 3D runtime

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/convert-ot1676-step.yml'
  pull_request:
    paths:
      - 'conversion/ot1676-trigger.txt'
      - '.github/workflows/convert-ot1676-step.yml'

permissions:
  contents: read

jobs:
  package-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Three.js browser runtime
        run: |
          mkdir -p runtime
          npm install --prefix runtime three@0.138.3
          cp runtime/node_modules/three/build/three.min.js runtime/
          cp runtime/node_modules/three/examples/js/loaders/GLTFLoader.js runtime/
          ls -lh runtime/three.min.js runtime/GLTFLoader.js

      - name: Upload browser runtime
        uses: actions/upload-artifact@v4
        with:
          name: THREEJS-OT1676-RUNTIME
          path: |
            runtime/three.min.js
            runtime/GLTFLoader.js
          if-no-files-found: error
          compression-level: 9
          retention-days: 3
