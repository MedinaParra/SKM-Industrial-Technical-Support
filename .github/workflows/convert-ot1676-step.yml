name: Convert OT-1676 STEP to GLB

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/convert-ot1676-step.yml'
      - 'tools/ot1676-step-to-glb.js'

permissions:
  contents: read

env:
  DRIVE_FILE_ID: 1Eyk88pXTfY7pAS-iqv9TcaxQjwLS2tGh
  STEP_FILE: ARMADO_OT1676.STEP
  GLB_FILE: ARMADO_OT1676_WEB.glb
  MANIFEST_FILE: ARMADO_OT1676_WEB_manifest.json

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Download temporary STEP from Google Drive
        shell: bash
        run: |
          python -m pip install --quiet gdown
          gdown "https://drive.google.com/uc?id=${DRIVE_FILE_ID}" -O "${STEP_FILE}" || true
          if ! grep -aq 'ISO-10303-21' "${STEP_FILE}" 2>/dev/null; then
            rm -f "${STEP_FILE}"
            curl --fail --location --retry 3 \
              "https://drive.usercontent.google.com/download?id=${DRIVE_FILE_ID}&export=download&confirm=t" \
              --output "${STEP_FILE}"
          fi
          grep -aq 'ISO-10303-21' "${STEP_FILE}"
          ls -lh "${STEP_FILE}"

      - name: Install OpenCascade converter
        run: npm install --no-save occt-import-js@0.0.23

      - name: Convert STEP to GLB
        env:
          LINEAR_DEFLECTION: '0.85'
          ANGULAR_DEFLECTION: '0.28'
        run: node tools/ot1676-step-to-glb.js "${STEP_FILE}" "${GLB_FILE}" "${MANIFEST_FILE}"

      - name: Show conversion summary
        run: |
          ls -lh "${GLB_FILE}" "${MANIFEST_FILE}"
          python - <<'PY'
          import json
          data = json.load(open('ARMADO_OT1676_WEB_manifest.json'))
          print(json.dumps(data['totals'], indent=2))
          print(json.dumps(data['output'], indent=2))
          PY

      - name: Upload converted model
        uses: actions/upload-artifact@v4
        with:
          name: OT1676-GLB-WEB
          path: |
            ARMADO_OT1676_WEB.glb
            ARMADO_OT1676_WEB_manifest.json
          if-no-files-found: error
          compression-level: 9
          retention-days: 3
